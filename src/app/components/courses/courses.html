<section class="px-4 md:px-6 lg:px-8 py-6 md:py-8 lg:py-12">
  <div class="flex justify-between items-end mb-4 md:mb-6 lg:mb-8">
    <h2 class="text-[#101819] dark:text-white text-2xl md:text-3xl lg:text-4xl font-extrabold tracking-tight flex items-center gap-2">
      <span class="w-8 md:w-12 lg:w-16 h-[2px] bg-primary"></span> 課程內容
    </h2>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
    <a routerLink="/course-details" [queryParams]="{tab: 'elementary'}" class="bg-accent-gold text-white p-6 md:p-8 lg:p-10 rounded-2xl md:rounded-3xl flex flex-col justify-between aspect-video md:aspect-auto hover:scale-[1.02] transition-transform">
      <span class="material-symbols-outlined text-5xl md:text-6xl opacity-50 self-end">child_care</span>
      <div>
        <h3 class="text-2xl md:text-3xl lg:text-4xl font-extrabold">國小部</h3>
        <p class="text-white/80 text-sm md:text-base">基礎扎根與興趣培養</p>
      </div>
    </a>
    <a routerLink="/course-details" [queryParams]="{tab: 'junior'}" class="bg-primary text-white p-6 md:p-8 lg:p-10 rounded-2xl md:rounded-3xl flex flex-col justify-between aspect-video md:aspect-auto hover:scale-[1.02] transition-transform">
      <span class="material-symbols-outlined text-5xl md:text-6xl opacity-50 self-end">menu_book</span>
      <div>
        <h3 class="text-2xl md:text-3xl lg:text-4xl font-extrabold">國中部</h3>
        <p class="text-white/80 text-sm md:text-base">精準複習與會考應戰</p>
      </div>
    </a>
    <a routerLink="/course-details" [queryParams]="{tab: 'senior'}" class="bg-[#D9B44A] text-white p-6 md:p-8 lg:p-10 rounded-2xl md:rounded-3xl flex flex-col justify-between aspect-video md:aspect-auto hover:scale-[1.02] transition-transform">
      <span class="material-symbols-outlined text-5xl md:text-6xl opacity-50 self-end">school</span>
      <div>
        <h3 class="text-2xl md:text-3xl lg:text-4xl font-extrabold">高中部</h3>
        <p class="text-white/80 text-sm md:text-base">進階深化與升學衝刺</p>
      </div>
    </a>
  </div>
</section>
