<footer class="px-4 py-8 text-center">
  <div class="flex justify-center gap-4 mb-4">
    <button (click)="showLINEQR()" class="size-10 rounded-full bg-green-500 flex items-center justify-center hover:scale-110 transition-transform cursor-pointer" title="LINE">
      <span class="material-symbols-outlined text-white text-lg">chat</span>
    </button>
    <a href="https://www.instagram.com/heshengeducation?igsh=MTdtcGJqZnlrdnFnNw==" target="_blank" rel="noopener noreferrer" class="size-10 rounded-full bg-gradient-to-tr from-purple-500 via-pink-500 to-orange-400 flex items-center justify-center hover:scale-110 transition-transform" title="Instagram">
      <span class="material-symbols-outlined text-white text-lg">photo_camera</span>
    </a>
    <a href="https://www.facebook.com/share/188qg1kSH8/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer" class="size-10 rounded-full bg-blue-600 flex items-center justify-center hover:scale-110 transition-transform" title="Facebook">
      <span class="material-symbols-outlined text-white text-lg">thumb_up</span>
    </a>
  </div>
  <p class="text-xs text-gray-400">&copy; 2024 禾笙文理補習班. 版權所有.</p>

  @if (lineQRVisible()) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm" (click)="hideLINEQR()">
      <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 max-w-xs mx-4" (click)="$event.stopPropagation()">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://lin.ee/nrn1FgR" alt="LINE QR Code" class="mx-auto" />
        <p class="text-center text-sm text-gray-500 mt-3">掃描 QR Code 加入 LINE</p>
        <a href="https://lin.ee/nrn1FgR" target="_blank" rel="noopener noreferrer" class="mt-3 block w-full py-2 bg-green-500 text-white rounded-lg text-sm font-bold text-center hover:opacity-90">直接開啟 LINE</a>
        <button (click)="hideLINEQR()" class="mt-2 w-full py-2 bg-gray-100 dark:bg-gray-700 rounded-lg text-sm text-gray-600 dark:text-gray-300">關閉</button>
      </div>
    </div>
  }
</footer>
