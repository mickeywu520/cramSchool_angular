<section class="p-4 md:p-6 lg:p-8">
  <div
    class="relative overflow-hidden rounded-xl bg-primary/5 md:rounded-2xl lg:rounded-3xl min-h-[440px] md:min-h-[500px] lg:min-h-[600px] flex flex-col justify-end p-6 md:p-8 lg:p-12 group"
    [style.cursor]="slides()[currentIndex()].link_url ? 'pointer' : 'default'"
    (click)="clickSlide(slides()[currentIndex()])"
  >
    <div class="absolute inset-0 z-0">
      @for (slide of slides(); track $index) {
        <img
          [src]="slide.is_event ? '' : slide.image"
          [alt]="slide.tag"
          class="w-full h-full object-cover brightness-75 absolute inset-0"
          [class.!hidden]="slide.is_event"
          [style.opacity]="$index === currentIndex() ? 1 : 0"
          style="transition: opacity 0.5s ease-in-out"
        >
      }
      <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
    </div>

    <div class="relative z-10 space-y-4 md:space-y-6 lg:space-y-8 max-w-md md:max-w-lg lg:max-w-2xl">
      @if (slides()[currentIndex()].is_event) {
        <span class="inline-block px-3 py-1 bg-red-500 text-white text-xs font-bold rounded-full uppercase tracking-widest">最新活動</span>
        <h1 class="text-white text-4xl md:text-5xl lg:text-6xl font-extrabold leading-[1.1] tracking-tight">
          {{ slides()[currentIndex()].tag }}
        </h1>
      } @else {
        <span class="inline-block px-3 py-1 bg-accent-gold text-white text-xs font-bold rounded-full uppercase tracking-widest">{{ slides()[currentIndex()].tag }}</span>
      }
    </div>

    <button class="absolute left-2 md:left-4 top-1/2 -translate-y-1/2 z-20 bg-black/30 hover:bg-black/50 text-white p-2 md:p-3 rounded-full backdrop-blur-sm transition-colors" (click)="prev(); $event.stopPropagation()">
      <span class="material-symbols-outlined">chevron_left</span>
    </button>
    <button class="absolute right-2 md:right-4 top-1/2 -translate-y-1/2 z-20 bg-black/30 hover:bg-black/50 text-white p-2 md:p-3 rounded-full backdrop-blur-sm transition-colors" (click)="next(); $event.stopPropagation()">
      <span class="material-symbols-outlined">chevron_right</span>
    </button>
    <div class="absolute bottom-4 md:bottom-6 left-1/2 -translate-x-1/2 z-20 flex gap-2">
      @for (slide of slides(); track $index; let i = $index) {
        <button class="w-2 h-2 md:w-3 md:h-3 rounded-full transition-all" [class.bg-white]="i === currentIndex()" [class.bg-white/50]="i !== currentIndex()" (click)="goTo(i); $event.stopPropagation()"></button>
      }
    </div>
  </div>
</section>
