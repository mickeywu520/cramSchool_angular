<section class="py-6 md:py-8 lg:py-12">
  <div class="px-4 md:px-6 lg:px-8 flex justify-between items-end mb-4 md:mb-6 lg:mb-8">
    <h2 class="text-[#101819] dark:text-white text-2xl md:text-3xl lg:text-4xl font-extrabold tracking-tight flex items-center gap-2">
      <span class="w-8 md:w-12 lg:w-16 h-[2px] bg-primary"></span> 師資介紹
    </h2>
    <a routerLink="/faculty" class="text-xs md:text-sm lg:text-base font-bold text-primary">查看全部</a>
  </div>
  <div class="flex overflow-x-auto gap-4 px-4 md:px-6 lg:px-8 pb-4 md:pb-6 lg:pb-8 no-scrollbar md:grid md:grid-cols-2 lg:grid-cols-4 md:overflow-visible md:gap-6 lg:gap-8">
    @for (teacher of featuredTeachers; track teacher.name) {
      <a [routerLink]="['/faculty']" [queryParams]="{teacher: teacher.name}" class="min-w-[200px] md:min-w-0 bg-white dark:bg-gray-800 rounded-xl md:rounded-2xl overflow-hidden bento-shadow flex-shrink-0 md:flex-shrink border border-gray-50 dark:border-gray-700 cursor-pointer hover:shadow-lg hover:scale-[1.02] transition-all block">
        <div class="relative aspect-[3/4] bg-gray-100">
          <img [alt]="teacher.name" class="w-full h-full object-cover" [src]="teacher.image"/>
          <div class="absolute top-2 right-2 px-2 py-1 bg-primary text-white text-[10px] md:text-xs font-bold rounded">{{ teacher.subject }}</div>
        </div>
        <div class="p-4 md:p-5 lg:p-6">
          <h4 class="font-extrabold text-[#101819] dark:text-white text-base md:text-lg lg:text-xl">{{ teacher.name }}</h4>
          <p class="text-xs md:text-sm lg:text-base text-gray-500 mt-1">{{ teacher.highlight }}</p>
        </div>
      </a>
    }
  </div>
</section>
