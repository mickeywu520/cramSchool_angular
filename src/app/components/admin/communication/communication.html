<div class="max-w-3xl mx-auto space-y-6">
  <h2 class="text-2xl font-bold text-gray-900 dark:text-white">新增聯絡簿記錄</h2>

  @if (success()) {
    <div class="bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 text-green-700 dark:text-green-400 px-4 py-3 rounded-lg text-sm flex items-center gap-2">
      <span class="material-symbols-outlined text-lg">check_circle</span>
      {{ success() }}
    </div>
  }

  @if (error()) {
    <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400 px-4 py-3 rounded-lg text-sm">
      {{ error() }}
    </div>
  }

  <div class="bg-white dark:bg-gray-800 rounded-xl p-6 space-y-5 border border-gray-200 dark:border-gray-700">

    <!-- Student Select -->
    <div class="space-y-1">
      <label class="text-sm font-bold text-gray-700 dark:text-gray-300">學生 <span class="text-red-500">*</span></label>
      <select [(ngModel)]="selectedStudentId" name="studentId"
        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm focus:ring-2 focus:ring-primary focus:outline-none dark:text-white">
        <option [ngValue]="null" disabled>選擇學生...</option>
        @for (s of students(); track s.id) {
          <option [ngValue]="s.id">{{ s.student_name }}（{{ s.grade }} - {{ s.school }}）</option>
        }
      </select>
    </div>

    <!-- Date -->
    <div class="space-y-1">
      <label class="text-sm font-bold text-gray-700 dark:text-gray-300">日期 <span class="text-red-500">*</span></label>
      <input type="date" [(ngModel)]="entryDate" name="entryDate"
        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm focus:ring-2 focus:ring-primary focus:outline-none dark:text-white"/>
    </div>

    <!-- Scores -->
    <div class="grid grid-cols-2 gap-4">
      <div class="space-y-1">
        <label class="text-sm font-bold text-gray-700 dark:text-gray-300">專注度（1-10）</label>
        <div class="flex items-center gap-3">
          <input type="range" min="1" max="10" [(ngModel)]="focusScore" name="focusScore"
            class="flex-1 accent-primary"/>
          <span class="text-sm font-bold text-primary min-w-[1.5rem] text-center">{{ focusScore() }}</span>
        </div>
      </div>
      <div class="space-y-1">
        <label class="text-sm font-bold text-gray-700 dark:text-gray-300">課堂互動（1-10）</label>
        <div class="flex items-center gap-3">
          <input type="range" min="1" max="10" [(ngModel)]="interactionScore" name="interactionScore"
            class="flex-1 accent-primary"/>
          <span class="text-sm font-bold text-primary min-w-[1.5rem] text-center">{{ interactionScore() }}</span>
        </div>
      </div>
    </div>

    <!-- Homework Completion -->
    <div class="space-y-1">
      <label class="text-sm font-bold text-gray-700 dark:text-gray-300">作業完成狀態</label>
      <select [(ngModel)]="homeworkCompletion" name="completion"
        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm focus:ring-2 focus:ring-primary focus:outline-none dark:text-white">
        @for (opt of completionOptions; track opt) {
          <option [value]="opt">{{ opt }}</option>
        }
      </select>
    </div>

    <!-- Teacher Comment -->
    <div class="space-y-1">
      <label class="text-sm font-bold text-gray-700 dark:text-gray-300">老師評語</label>
      <textarea [(ngModel)]="teacherComment" name="comment" rows="3"
        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm focus:ring-2 focus:ring-primary focus:outline-none dark:text-white placeholder:text-gray-400"
        placeholder="輸入對學生今日表現的評語..."></textarea>
    </div>

    <!-- Homework List -->
    <div class="space-y-2">
      <div class="flex items-center justify-between">
        <label class="text-sm font-bold text-gray-700 dark:text-gray-300">作業列表</label>
        <button (click)="addHomework()" type="button"
          class="text-xs font-bold text-primary hover:text-primary/80 flex items-center gap-1">
          <span class="material-symbols-outlined text-sm">add_circle</span>
          新增作業
        </button>
      </div>
      @for (hw of homeworkList(); track i; let i = $index) {
        <div class="flex items-start gap-2 p-3 rounded-lg bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600">
          <div class="flex-1 grid grid-cols-3 gap-2">
            <input [(ngModel)]="hw.subject" [name]="'hw_subject_' + i" placeholder="科目"
              class="px-3 py-2 rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm focus:ring-2 focus:ring-primary focus:outline-none dark:text-white"/>
            <input [(ngModel)]="hw.content" [name]="'hw_content_' + i" placeholder="作業內容"
              class="px-3 py-2 rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm focus:ring-2 focus:ring-primary focus:outline-none dark:text-white"/>
            <input type="date" [(ngModel)]="hw.due_date" [name]="'hw_due_' + i"
              class="px-3 py-2 rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm focus:ring-2 focus:ring-primary focus:outline-none dark:text-white"/>
          </div>
          <button (click)="removeHomework(i)" type="button"
            class="text-red-400 hover:text-red-600 mt-1">
            <span class="material-symbols-outlined text-lg">remove_circle</span>
          </button>
        </div>
      } @empty {
        <p class="text-xs text-gray-400 italic">尚未新增作業</p>
      }
    </div>

    <!-- Reminder List -->
    <div class="space-y-2">
      <div class="flex items-center justify-between">
        <label class="text-sm font-bold text-gray-700 dark:text-gray-300">提醒事項</label>
        <button (click)="addReminder()" type="button"
          class="text-xs font-bold text-primary hover:text-primary/80 flex items-center gap-1">
          <span class="material-symbols-outlined text-sm">add_circle</span>
          新增提醒
        </button>
      </div>
      @for (rem of reminderList(); track i; let i = $index) {
        <div class="flex items-start gap-2 p-3 rounded-lg bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600">
          <div class="flex-1 flex gap-2">
            <input [(ngModel)]="rem.content" [name]="'rem_content_' + i" placeholder="提醒內容"
              class="flex-1 px-3 py-2 rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm focus:ring-2 focus:ring-primary focus:outline-none dark:text-white"/>
            <select [(ngModel)]="rem.priority" [name]="'rem_priority_' + i"
              class="px-3 py-2 rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm focus:ring-2 focus:ring-primary focus:outline-none dark:text-white">
              <option value="normal">一般</option>
              <option value="high">重要</option>
            </select>
          </div>
          <button (click)="removeReminder(i)" type="button"
            class="text-red-400 hover:text-red-600 mt-1">
            <span class="material-symbols-outlined text-lg">remove_circle</span>
          </button>
        </div>
      } @empty {
        <p class="text-xs text-gray-400 italic">尚未新增提醒</p>
      }
    </div>

    <!-- Submit -->
    <div class="pt-4 border-t border-gray-200 dark:border-gray-700">
      <button (click)="submit()" [disabled]="submitting()"
        class="w-full bg-primary hover:bg-primary/90 disabled:opacity-50 text-white font-bold py-3 rounded-lg text-sm transition-all flex items-center justify-center gap-2">
        @if (submitting()) {
          <span class="material-symbols-outlined animate-spin text-lg">refresh</span>
          送出中...
        } @else {
          <span class="material-symbols-outlined text-lg">send</span>
          建立聯絡簿記錄
        }
      </button>
    </div>

  </div>
</div>
