<div class="flex h-screen bg-gray-100 dark:bg-gray-900">
  <!-- Sidebar -->
  <aside
    class="bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col transition-all duration-300"
    [class.w-64]="sidebarOpen()"
    [class.w-20]="!sidebarOpen()"
  >
    <!-- Logo -->
    <div class="flex items-center gap-3 p-4 border-b border-gray-200 dark:border-gray-700">
      <div class="size-10 bg-primary/10 text-primary rounded-lg flex items-center justify-center shrink-0">
        <span class="material-symbols-outlined">school</span>
      </div>
      @if (sidebarOpen()) {
        <span class="font-extrabold text-lg text-gray-900 dark:text-white whitespace-nowrap">禾笙後台</span>
      }
    </div>

    <!-- Menu -->
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
      @for (item of menuItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-primary/10 text-primary font-semibold"
          class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
        >
          <span class="material-symbols-outlined shrink-0">{{ item.icon }}</span>
          @if (sidebarOpen()) {
            <span class="text-sm whitespace-nowrap">{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <!-- Bottom actions -->
    <div class="p-3 border-t border-gray-200 dark:border-gray-700 space-y-1">
      <a
        routerLink="/"
        class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
      >
        <span class="material-symbols-outlined shrink-0">open_in_new</span>
        @if (sidebarOpen()) {
          <span class="text-sm whitespace-nowrap">回到前台</span>
        }
      </a>
      <button
        (click)="logout()"
        class="flex items-center gap-3 px-3 py-3 rounded-lg text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors w-full"
      >
        <span class="material-symbols-outlined shrink-0">logout</span>
        @if (sidebarOpen()) {
          <span class="text-sm whitespace-nowrap">登出</span>
        }
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Top bar -->
    <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 py-3 flex items-center gap-4">
      <button
        (click)="toggleSidebar()"
        class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-400 transition-colors"
      >
        <span class="material-symbols-outlined">{{ sidebarOpen() ? 'menu_open' : 'menu' }}</span>
      </button>
      <h1 class="text-lg font-bold text-gray-900 dark:text-white">首頁資訊管理</h1>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
