<div class="max-w-4xl mx-auto space-y-6">
  <h2 class="text-2xl font-bold text-gray-900 dark:text-white">選課管理</h2>

  @if (success()) {
    <div class="bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 text-green-700 dark:text-green-400 px-4 py-3 rounded-lg text-sm">{{ success() }}</div>
  }
  @if (error()) {
    <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400 px-4 py-3 rounded-lg text-sm">{{ error() }}</div>
  }

  <!-- Course Select -->
  <div class="bg-white dark:bg-gray-800 rounded-xl p-4 border border-gray-200 dark:border-gray-700">
    <label class="text-sm font-bold text-gray-700 dark:text-gray-300 block mb-2">選擇課程</label>
    <select (change)="selectCourse(numberFromEvent($any($event.target).value))" class="w-full px-4 py-2.5 rounded-lg border text-sm">
      <option value="">請選擇課程...</option>
      @for (c of courses(); track c.id) {
        <option [value]="c.id">{{ c.category }} - {{ c.grade_level }} {{ c.name }}（{{ c.subject }}）</option>
      }
    </select>
  </div>

  @if (selectedCourseId()) {
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
      <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
        <h3 class="font-bold text-gray-900 dark:text-white">已選學生</h3>
        <span class="text-sm text-gray-400">{{ enrollments().length }} 人</span>
      </div>

      @if (loading()) {
        <div class="text-center py-8"><span class="material-symbols-outlined text-3xl text-gray-300 animate-spin">refresh</span></div>
      } @else {
        <table class="w-full text-sm">
          <thead class="bg-gray-50 dark:bg-gray-700/50">
            <tr>
              <th class="text-left px-4 py-3 font-bold text-gray-500">學生姓名</th>
              <th class="text-left px-4 py-3 font-bold text-gray-500">選課時間</th>
              <th class="text-right px-4 py-3 font-bold text-gray-500">操作</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
            @for (e of enrollments(); track e.id) {
              <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/30">
                <td class="px-4 py-3 font-medium">{{ e.student_name }}</td>
                <td class="px-4 py-3 text-gray-400">{{ e.enrolled_at || '-' }}</td>
                <td class="px-4 py-3 text-right">
                  <button (click)="removeEnrollment(e)" class="text-red-500 hover:text-red-700 text-xs font-bold">移除</button>
                </td>
              </tr>
            } @empty {
              <tr><td colspan="3" class="text-center py-8 text-gray-400">尚無學生選課</td></tr>
            }
          </tbody>
        </table>

        <!-- Add Student -->
        <div class="p-4 border-t border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-700/50 flex gap-3">
          <select [(ngModel)]="addStudentId" class="flex-1 px-3 py-2 rounded-lg border text-sm">
            <option [ngValue]="null">選擇學生加入...</option>
            @for (s of allStudents(); track s.id) {
              <option [ngValue]="s.id">{{ s.student_name }}</option>
            }
          </select>
          <button (click)="addStudent()" [disabled]="!addStudentId()"
            class="bg-primary hover:bg-primary/90 disabled:opacity-50 text-white font-bold px-4 py-2 rounded-lg text-sm">
            加入
          </button>
        </div>
      }
    </div>
  }
</div>
