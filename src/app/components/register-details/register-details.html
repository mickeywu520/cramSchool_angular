<div class="min-h-screen bg-background-light dark:bg-background-dark font-display text-[#101819] dark:text-[#f9fbfb]">
  <nav class="sticky top-0 z-50 flex items-center bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md p-4 md:p-5 lg:p-6 justify-between border-b border-gray-100 dark:border-gray-800">
    <div class="flex items-center gap-3">
      <a routerLink="/register" class="text-gray-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-xl md:text-2xl lg:text-3xl">arrow_back_ios</span>
      </a>
      <h1 class="text-[#101819] dark:text-white text-xl md:text-2xl lg:text-3xl font-extrabold leading-tight tracking-tight">學生註冊</h1>
    </div>
    <div class="size-10 md:size-12 lg:size-14 shrink-0 flex items-center justify-center">
      <img src="/logo.png" alt="禾笙教育" class="size-full object-contain" />
    </div>
  </nav>
  
  <main class="max-w-md md:max-w-lg lg:max-w-xl mx-auto px-4 md:px-6 lg:px-8 py-6 md:py-8 lg:py-10">
    <div class="text-center mb-8 md:mb-10 lg:mb-12">
      <div class="inline-block px-3 md:px-4 py-1 rounded-full bg-primary/5 text-primary text-xs md:text-sm font-bold mb-4">歡迎加入</div>
      <h2 class="text-2xl md:text-3xl lg:text-4xl font-extrabold text-[#101819] dark:text-white mb-2 leading-tight">加入禾笙，<br/>開啟卓越學習之旅</h2>
      <p class="text-gray-500 text-sm md:text-base">請填寫以下資訊，我們將有專人與您聯繫</p>
    </div>
    
    <form class="space-y-4 md:space-y-5 lg:space-y-6" onsubmit="return false;">
      @if (error()) {
        <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400 px-4 py-3 rounded-lg text-sm">
          {{ error() }}
        </div>
      }

      <div class="space-y-2">
        <label class="block text-sm md:text-base font-bold text-gray-700 dark:text-gray-300 ml-1">
          學生姓名 <span class="text-red-500">*</span>
        </label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl">person</span>
          <input [(ngModel)]="studentName" name="studentName" class="w-full pl-12 pr-4 py-3 md:py-3.5 lg:py-4 bg-white dark:bg-gray-800 border-none rounded-2xl bento-shadow text-sm md:text-base focus:ring-2 focus:ring-primary focus:outline-none dark:text-white placeholder:text-gray-400" placeholder="輸入學生全名" type="text"/>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-sm md:text-base font-bold text-gray-700 dark:text-gray-300 ml-1">
          性別 <span class="text-red-500">*</span>
        </label>
        <div class="flex gap-4 ml-1">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="gender" value="男" [checked]="gender() === '男'" (change)="gender.set('男')" class="text-primary focus:ring-primary"/>
            <span class="text-sm md:text-base font-bold dark:text-gray-300">男</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="gender" value="女" [checked]="gender() === '女'" (change)="gender.set('女')" class="text-primary focus:ring-primary"/>
            <span class="text-sm md:text-base font-bold dark:text-gray-300">女</span>
          </label>
        </div>
      </div>
      
      <div class="space-y-2">
        <label class="block text-sm md:text-base font-bold text-gray-700 dark:text-gray-300 ml-1">
          學生出生年月日 <span class="text-red-500">*</span>
        </label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl">cake</span>
          <input [(ngModel)]="birthDate" name="birthDate" class="w-full pl-12 pr-4 py-3 md:py-3.5 lg:py-4 bg-white dark:bg-gray-800 border-none rounded-2xl bento-shadow text-sm md:text-base focus:ring-2 focus:ring-primary focus:outline-none dark:text-white" type="date"/>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-sm md:text-base font-bold text-gray-700 dark:text-gray-300 ml-1">
          就讀學校 <span class="text-red-500">*</span>
        </label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl">apartment</span>
          <input [(ngModel)]="school" name="school" class="w-full pl-12 pr-4 py-3 md:py-3.5 lg:py-4 bg-white dark:bg-gray-800 border-none rounded-2xl bento-shadow text-sm md:text-base focus:ring-2 focus:ring-primary focus:outline-none dark:text-white placeholder:text-gray-400" placeholder="輸入就讀學校名稱" type="text"/>
        </div>
      </div>
      
      <div class="space-y-2">
        <label class="block text-sm md:text-base font-bold text-gray-700 dark:text-gray-300 ml-1">
          年級 <span class="text-red-500">*</span>
        </label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl">school</span>
          <select [(ngModel)]="grade" name="grade" class="w-full pl-12 pr-4 py-3 md:py-3.5 lg:py-4 bg-white dark:bg-gray-800 border-none rounded-2xl bento-shadow text-sm md:text-base focus:ring-2 focus:ring-primary focus:outline-none dark:text-white appearance-none">
            <option disabled value="">請選擇目前就讀年級</option>
            @for (g of gradeOptions; track g) {
              <option [value]="g">{{ g }}</option>
            }
          </select>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-sm md:text-base font-bold text-gray-700 dark:text-gray-300 ml-1">班級（選填）</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl">meeting_room</span>
          <input [(ngModel)]="className" name="className" class="w-full pl-12 pr-4 py-3 md:py-3.5 lg:py-4 bg-white dark:bg-gray-800 border-none rounded-2xl bento-shadow text-sm md:text-base focus:ring-2 focus:ring-primary focus:outline-none dark:text-white placeholder:text-gray-400" placeholder="輸入班級" type="text"/>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-sm md:text-base font-bold text-gray-700 dark:text-gray-300 ml-1">
          家長姓名 <span class="text-red-500">*</span>
        </label>
        <div class="flex gap-3">
          <div class="relative flex-1">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl">family_restroom</span>
            <input [(ngModel)]="parentName" name="parentName" class="w-full pl-12 pr-4 py-3 md:py-3.5 lg:py-4 bg-white dark:bg-gray-800 border-none rounded-2xl bento-shadow text-sm md:text-base focus:ring-2 focus:ring-primary focus:outline-none dark:text-white placeholder:text-gray-400" placeholder="輸入家長姓名" type="text"/>
          </div>
          <div class="relative w-28 shrink-0">
            <select [(ngModel)]="parentTitle" name="parentTitle" class="w-full pl-3 pr-4 py-3 md:py-3.5 lg:py-4 bg-white dark:bg-gray-800 border-none rounded-2xl bento-shadow text-sm md:text-base focus:ring-2 focus:ring-primary focus:outline-none dark:text-white appearance-none">
              <option value="">稱謂</option>
              @for (t of parentTitleOptions; track t) {
                <option [value]="t">{{ t }}</option>
              }
            </select>
          </div>
        </div>
      </div>
      
      <div class="space-y-2">
        <label class="block text-sm md:text-base font-bold text-gray-700 dark:text-gray-300 ml-1">
          家長1 / 連絡電話 <span class="text-red-500">*</span>
        </label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl">call</span>
          <input [(ngModel)]="phone" name="phone" class="w-full pl-12 pr-4 py-3 md:py-3.5 lg:py-4 bg-white dark:bg-gray-800 border-none rounded-2xl bento-shadow text-sm md:text-base focus:ring-2 focus:ring-primary focus:outline-none dark:text-white placeholder:text-gray-400" placeholder="09XX-XXX-XXX" type="tel"/>
        </div>
      </div>

      <div class="p-4 bg-gray-50 dark:bg-gray-800/50 rounded-2xl space-y-4">
        <h3 class="text-sm font-bold text-gray-500 dark:text-gray-400">第二位家長（選填）</h3>
        <div class="flex gap-3">
          <div class="relative flex-1">
            <input [(ngModel)]="parent2Name" name="parent2Name" class="w-full pl-4 pr-4 py-3 bg-white dark:bg-gray-800 border-none rounded-xl bento-shadow text-sm focus:ring-2 focus:ring-primary focus:outline-none dark:text-white placeholder:text-gray-400" placeholder="第二位家長姓名" type="text"/>
          </div>
          <div class="relative w-24 shrink-0">
            <select [(ngModel)]="parent2Title" name="parent2Title" class="w-full pl-3 pr-4 py-3 bg-white dark:bg-gray-800 border-none rounded-xl bento-shadow text-sm focus:ring-2 focus:ring-primary focus:outline-none dark:text-white appearance-none">
              <option value="">稱謂</option>
              @for (t of parentTitleOptions; track t) {
                <option [value]="t">{{ t }}</option>
              }
            </select>
          </div>
        </div>
        <div class="relative">
          <input [(ngModel)]="parent2Phone" name="parent2Phone" class="w-full pl-4 pr-4 py-3 bg-white dark:bg-gray-800 border-none rounded-xl bento-shadow text-sm focus:ring-2 focus:ring-primary focus:outline-none dark:text-white placeholder:text-gray-400" placeholder="第二位家長連絡電話" type="tel"/>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-sm md:text-base font-bold text-gray-700 dark:text-gray-300 ml-1">住家電話（選填）</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl">home</span>
          <input [(ngModel)]="homePhone" name="homePhone" class="w-full pl-12 pr-4 py-3 md:py-3.5 lg:py-4 bg-white dark:bg-gray-800 border-none rounded-2xl bento-shadow text-sm md:text-base focus:ring-2 focus:ring-primary focus:outline-none dark:text-white placeholder:text-gray-400" placeholder="住家電話（選填）" type="tel"/>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-sm md:text-base font-bold text-gray-700 dark:text-gray-300 ml-1">身分證字號 <span class="text-red-500">*</span></label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl">badge</span>
          <input [(ngModel)]="idNumber" name="idNumber" (keydown.enter)="submit()" class="w-full pl-12 pr-4 py-3 md:py-3.5 lg:py-4 bg-white dark:bg-gray-800 border-none rounded-2xl bento-shadow text-sm md:text-base focus:ring-2 focus:ring-primary focus:outline-none dark:text-white placeholder:text-gray-400" placeholder="請輸入學生身分證字號" type="text"/>
        </div>
      </div>
      
      <div class="pt-4 md:pt-6">
        <button (click)="submit()" [disabled]="loading()"
          class="w-full bg-primary hover:bg-primary/90 disabled:opacity-50 text-white font-extrabold py-4 md:py-5 lg:py-6 rounded-2xl bento-shadow transition-all text-lg md:text-xl flex items-center justify-center gap-2">
          @if (loading()) {
            <span class="material-symbols-outlined animate-spin">refresh</span>
          }
          {{ loading() ? '註冊中...' : '立即註冊' }}
          @if (!loading()) {
            <span class="material-symbols-outlined">arrow_forward</span>
          }
        </button>
      </div>
    </form>
    
    <footer class="mt-12 md:mt-14 lg:mt-16 pb-6 md:pb-8 text-center">
      <p class="text-xs md:text-sm text-gray-400 leading-relaxed">
        點擊註冊即表示您同意本校的<br/>
        <a class="text-primary font-bold" href="#">隱私權條款</a> 與 <a class="text-primary font-bold" href="#">使用規範</a>
      </p>
    </footer>
  </main>
</div>
