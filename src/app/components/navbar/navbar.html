<nav class="sticky top-0 z-50 flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 md:p-5 lg:p-6 justify-between border-b border-gray-100 dark:border-gray-800">
  <a routerLink="/" class="flex items-center gap-2 md:gap-3 lg:gap-4">
    <img src="/logo.png" alt="禾笙教育" class="h-8 md:h-10 lg:h-12 w-auto" />
    <h2 class="text-[#101819] dark:text-white text-xl md:text-2xl lg:text-3xl font-extrabold leading-tight tracking-tight">禾笙教育</h2>
  </a>

  @if (auth.currentUser()) {
    <div class="flex items-center gap-2">
      <span class="text-sm md:text-base font-bold text-gray-600 dark:text-gray-300">{{ displayName }}</span>
      @if (auth.currentUser()?.role === 'student') {
        <a routerLink="/student" class="bg-green-600 text-white px-3 md:px-4 py-1.5 md:py-2 rounded-lg md:rounded-xl text-xs md:text-sm font-bold tracking-wide hover:opacity-90 transition-all flex items-center gap-1">
          <span class="material-symbols-outlined text-sm">person</span>
          學生專區
        </a>
      }
      @if (auth.isAdmin) {
        <a routerLink="/admin" class="bg-accent-gold text-white px-3 md:px-4 py-1.5 md:py-2 rounded-lg md:rounded-xl text-xs md:text-sm font-bold tracking-wide hover:opacity-90 transition-all flex items-center gap-1">
          <span class="material-symbols-outlined text-sm">settings</span>
          管理後台
        </a>
      }
      <button (click)="logout()" class="bg-primary text-white px-3 md:px-4 py-1.5 md:py-2 rounded-lg md:rounded-xl text-xs md:text-sm font-bold tracking-wide hover:bg-primary/90 transition-colors">
        登出
      </button>
    </div>
  } @else {
    <a routerLink="/register" class="bg-primary text-white px-4 md:px-6 lg:px-8 py-2 md:py-3 lg:py-4 rounded-lg md:rounded-xl text-sm md:text-base lg:text-lg font-bold tracking-wide">
      註冊/登入
    </a>
  }
</nav>
